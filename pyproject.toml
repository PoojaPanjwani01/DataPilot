[tool.pytest.ini_options]
minversion = "6.0"
addopts = "-ra -q --cov=backend/app --cov-report=term-missing"
testpaths = [
    "backend/tests"
]
pythonpath = ["."]

[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
(
  /(
      \.eggs
    | \.git
    | \.hg
    | \.mypy_cache
    | \.tox
    | \.venv
    | _build
    | buck-out
    | build
    | dist
  )/
)
'''
